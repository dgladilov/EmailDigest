<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{{RELEASE_TITLE}}</title>
  <!--[if mso]>
  <noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
  <![endif]-->
  <style>
    body, table, td, a { -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }

    img { -ms-interpolation-mode:bicubic; border:0; }

<body style="margin:0; padding:0; background-color:#f4f5f7;">
  <div style="display:none; max-height:0; overflow:hidden; opacity:0; font-size:1px; color:#f4f5f7;">{{INTRO_TEXT}}</div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f5f7;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" class="container" width="600" cellpadding="0" cellspacing="0" style="width:600px; max-width:600px; background-color:#ffffff; border-radius:20px; overflow:hidden;">

          <tr>
            <td style="padding:0;">
              <!--[if mso]>
              <v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false" style="width:600px; height:120px;">
                <v:fill type="gradient" color="#007A33" color2="#0FA8E0" angle="120" />
                <v:textbox inset="0,0,0,0"><![endif]-->
              <div style="background-color:#21A038; background-image:linear-gradient(120deg, #007A33 0%, #21A038 45%, #0FA8E0 100%);">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="padding:36px 40px;" class="px">
                      <p style="margin:0; font-family:Arial,Helvetica,sans-serif; font-size:26px; font-weight:bold; line-height:1.3; color:#ffffff;">{{RELEASE_TITLE}}</p>
                    </td>
                  </tr>
                </table>
              </div>
              <!--[if mso]></v:textbox></v:rect><![endif]-->
            </td>
          </tr>

          <tr>
            <td style="padding:32px 40px 8px 40px;" class="px">
              <p style="margin:0; font-family:Arial,Helvetica,sans-serif; font-size:16px; line-height:1.6; color:#1f1f1f;">{{INTRO_TEXT}}</p>
            </td>
          </tr>

          {{FEATURES}}

          <tr>
            <td style="padding:24px 40px 36px 40px;" class="px">
              <p style="margin:0; font-family:Arial,Helvetica,sans-serif; font-size:13px; line-height:1.6; color:#9aa6b2;">
                Вопросы по релизу — пишите в {{CONTACT}}.<br>{{TEAM_NAME}}
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
